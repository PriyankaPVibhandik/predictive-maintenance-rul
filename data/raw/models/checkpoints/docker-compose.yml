version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config
    environment:
      - MLFLOW_TRACKING_URI=mlruns
    depends_on:
      - mlflow

  dashboard:
    build: .
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "pip install mlflow -q && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
